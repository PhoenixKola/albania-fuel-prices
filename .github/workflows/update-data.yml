name: Update fuel data (Europe)

on:
  schedule:
    - cron: "15 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install ingest deps
        working-directory: ingest
        run: npm ci

      - name: Run ingest
        working-directory: ingest
        run: npm run run

      - name: Commit changes (if any)
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest.json data/history.json data/trends.json
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Update fuel data"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # Rebuilds the site so the prerendered HTML picks up today's prices.
      # Only needed if the Cloudflare Pages project is NOT git-connected to
      # main; set the CF_PAGES_DEPLOY_HOOK repo secret to enable it.
      - name: Trigger Cloudflare Pages deploy
        if: steps.commit.outputs.changed == 'true'
        env:
          HOOK: ${{ secrets.CF_PAGES_DEPLOY_HOOK }}
        run: |
          if [ -n "$HOOK" ]; then
            curl -fsS -X POST "$HOOK"
            echo "Deploy hook triggered."
          else
            echo "No CF_PAGES_DEPLOY_HOOK secret set; skipping (fine if the Pages project is git-connected)."
          fi