    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "WebSite",
            "name": "Fuel Prices Today",
            "url": "https://karburantisot.com/",
            "inLanguage": "en"
          },
          {
            "@type": "WebPage",
            "name": "Fuel Prices Today | Compare Fuel Prices in Albania and Europe",
            "url": "https://karburantisot.com/",
            "inLanguage": "en",
            "description": "Compare public fuel prices across Albania and Europe, view country rankings, check nearby stations, and understand current petrol and diesel price differences."
          },
          {
            "@type": "WebApplication",
            "name": "Fuel Prices Today",
            "url": "https://karburantisot.com/",
            "description": "A public fuel price comparison website for Albania and Europe with country rankings, nearby station lookup, and practical price context.",
            "applicationCategory": "TravelApplication",
            "operatingSystem": "Any",
            "inLanguage": "en",
            "offers": { "@type": "Offer", "price": "0", "priceCurrency": "EUR" }
          }
        ]
      }
    </script>

    <script>
      (function () {
        try {
          var t = localStorage.getItem("theme");
          if (t !== "light" && t !== "dark") {
            t =
              window.matchMedia &&
              window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light";
          }
          document.documentElement.dataset.theme = t;
        } catch (e) {}
      })();
    </script>
