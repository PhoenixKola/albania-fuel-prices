      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "WebSite",
            "name": "Karburanti Sot",
            "url": "https://karburantisot.com/",

            "@type": "WebPage",
            "name": "Karburanti Sot — Çmimet e karburantit në Shqipëri & Europë",

          }
        ]
      }

    <script>
      (function () {
        try {
          var t = localStorage.getItem("theme");
          if (t !== "light" && t !== "dark") {
            t =
              window.matchMedia &&
              window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light";
          }
          document.documentElement.dataset.theme = t;
        } catch (e) {}
      })();
    </script>
